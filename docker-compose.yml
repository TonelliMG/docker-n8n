services:

  postgres:
    image: postgres:15.18
    container_name: ${COMPOSE_PROJECT_NAME}_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_POSTGRESDB_USER}
      POSTGRES_PASSWORD: ${DB_POSTGRESDB_PASSWORD}
      POSTGRES_DB: ${DB_POSTGRESDB_DATABASE}
      TZ: ${TZ}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - n8n_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_POSTGRESDB_USER} -d ${DB_POSTGRESDB_DATABASE}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  n8n:
    build:
      context: .
      args:
        TZ: ${TZ}
    image: ${COMPOSE_PROJECT_NAME}/n8n:2.28.3
    container_name: ${COMPOSE_PROJECT_NAME}_app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${N8N_PORT}:5678"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - n8n_network
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:5678/healthz || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  postgres_data:
  n8n_data:

networks:
  n8n_network:
    driver: bridge
